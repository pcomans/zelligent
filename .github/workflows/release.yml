name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag matches VERSION file
        run: |
          FILE_VERSION="v$(cat VERSION)"
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: VERSION file ($FILE_VERSION) does not match tag ($TAG_VERSION)" >&2
            exit 1
          fi

      - name: Install Rust wasm32-wasip1 target
        run: rustup target add wasm32-wasip1

      - name: Stamp and build WASM plugin
        run: |
          VERSION=$(cat "$GITHUB_WORKSPACE/VERSION")
          sed -i.bak "s/version = \"0.0.0-dev\"/version = \"$VERSION\"/" Cargo.toml
          grep -q "version = \"$VERSION\"" Cargo.toml || { echo "Failed to stamp Cargo.toml"; exit 1; }
          cargo build --release
        working-directory: plugin

      - name: Stage release artifacts
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p release-staging
          sed "s/__COMMIT_SHA__/$VERSION/" zelligent.sh > release-staging/zelligent
          chmod +x release-staging/zelligent
          cp plugin/target/wasm32-wasip1/release/zelligent-plugin.wasm release-staging/
          cp -r claude-plugin release-staging/
          cp README.md release-staging/
          tar -czf "zelligent-${VERSION}-darwin-universal.tar.gz" -C release-staging .
          SHA256=$(shasum -a 256 "zelligent-${VERSION}-darwin-universal.tar.gz" | awk '{print $1}')
          echo "SHA256_DARWIN=$SHA256" >> "$GITHUB_ENV"
          echo "TARBALL_DARWIN=zelligent-${VERSION}-darwin-universal.tar.gz" >> "$GITHUB_ENV"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: zelligent-*-darwin-universal.tar.gz

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust wasm32-wasip1 target
        run: rustup target add wasm32-wasip1

      - name: Stamp and build WASM plugin
        run: |
          VERSION=$(cat "$GITHUB_WORKSPACE/VERSION")
          sed -i "s/version = \"0.0.0-dev\"/version = \"$VERSION\"/" Cargo.toml
          cargo build --release
        working-directory: plugin

      - name: Stage release artifacts
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p release-staging
          sed "s/__COMMIT_SHA__/$VERSION/" zelligent.sh > release-staging/zelligent
          chmod +x release-staging/zelligent
          cp plugin/target/wasm32-wasip1/release/zelligent-plugin.wasm release-staging/
          cp -r claude-plugin release-staging/
          cp README.md release-staging/
          tar -czf "zelligent-${VERSION}-linux-x86_64.tar.gz" -C release-staging .
          echo "TARBALL_LINUX=zelligent-${VERSION}-linux-x86_64.tar.gz" >> "$GITHUB_ENV"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: zelligent-*-linux-x86_64.tar.gz

  release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            macos-release/*.tar.gz
            linux-release/*.tar.gz
          generate_release_notes: true
          body: |
            ## Install

            ### macOS (Homebrew)
            ```bash
            brew install pcomans/zelligent/zelligent
            zelligent doctor
            ```

            ### Linux (manual)
            ```bash
            curl -L https://github.com/pcomans/zelligent/releases/download/${{ github.ref_name }}/zelligent-${{ github.ref_name }}-linux-x86_64.tar.gz | tar -xz
            sudo mv zelligent/zelligent /usr/local/bin/
            sudo mkdir -p /usr/local/share/zelligent
            sudo mv zelligent/zelligent-plugin.wasm /usr/local/share/zelligent/
            ```
